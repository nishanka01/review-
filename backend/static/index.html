<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenEnv | CodeReview Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-[#0a0a0c] text-slate-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-6">
        <!-- Header -->
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center space-x-4">
                <div class="bg-indigo-600 p-2 rounded-lg"><svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg></div>
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight">OpenEnv <span class="text-indigo-400">Dashboard</span></h1>
                    <p class="text-slate-500 text-sm mono">RL-Based Code Audit Simulation</p>
                </div>
                <div class="flex items-center gap-1 ml-6 bg-slate-800/50 p-1 rounded-md">
                   <button id="lang-py" onclick="switchLang('python')" class="px-3 py-1 rounded text-[10px] font-bold bg-indigo-600 text-white transition">PYTHON</button>
                   <button id="lang-js" onclick="switchLang('javascript')" class="px-3 py-1 rounded text-[10px] font-bold text-slate-400 hover:text-white transition">JS/TS</button>
                </div>
            </div>
            <div class="flex space-x-3">
                <button id="btn-easy" onclick="resetTask('task_1')" class="px-4 py-2 rounded-md bg-slate-800 hover:bg-slate-700 transition font-semibold text-xs mono">TASK: EASY</button>
                <button id="btn-med" onclick="resetTask('task_2')" class="px-4 py-2 rounded-md bg-slate-800 hover:bg-slate-700 transition font-semibold text-xs mono">TASK: MEDIUM</button>
                <button id="btn-hard" onclick="resetTask('task_3')" class="px-4 py-2 rounded-md bg-slate-800 hover:bg-slate-700 transition font-semibold text-xs mono">TASK: HARD</button>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-6">
            <!-- Left: Editor & Terminal -->
            <div class="col-span-8 space-y-6">
                <div class="glass rounded-xl overflow-hidden">
                    <div class="bg-slate-800/50 px-4 py-2 border-b border-white/10 flex justify-between items-center">
                        <span class="text-xs font-mono text-slate-400">EDITOR // TASK_INPUT</span>
                        <button onclick="submitCode()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-1 rounded text-xs font-bold transition">SUBMIT & ANALYZE</button>
                    </div>
                    <textarea id="editor" class="w-full h-[400px] bg-transparent text-indigo-100 p-6 font-mono text-sm focus:outline-none resize-none leading-relaxed"></textarea>
                </div>

                <div class="glass rounded-xl p-6">
                    <h3 class="text-sm font-bold text-slate-400 mb-4 flex items-center"><svg class="w-4 h-4 mr-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg> PROGRAMMATIC LOGS</h3>
                    <div id="logs" class="space-y-2 h-[150px] overflow-auto text-xs font-mono text-slate-500">
                        <p class="text-indigo-400">> System Ready. Awaiting task selection...</p>
                    </div>
                </div>
            </div>

            <!-- Right: Stats & Rewards -->
            <div class="col-span-4 space-y-6">
                <!-- Status Card -->
                <div class="glass rounded-xl p-6 bg-gradient-to-br from-indigo-900/10 to-transparent">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">RL Environment State</h2>
                    <div id="status-grid" class="grid grid-cols-2 gap-4">
                        <div class="bg-black/20 p-4 rounded-lg">
                            <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Step Count</p>
                            <p id="step-count" class="text-xl font-mono text-white">0 / 5</p>
                        </div>
                        <div class="bg-black/20 p-4 rounded-lg">
                            <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Max Score</p>
                            <p id="max-score" class="text-xl font-mono text-success text-emerald-400">0.00</p>
                        </div>
                    </div>
                </div>

                <!-- Reward Feed -->
                <div class="glass rounded-xl p-6 flex-1 overflow-hidden">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Reward Trajectory</h2>
                    <div id="reward-feed" class="space-y-3 h-[380px] overflow-auto pr-2">
                        <!-- Rewards pop here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const logs = document.getElementById('logs');
        const rewardFeed = document.getElementById('reward-feed');
        const stepCountEl = document.getElementById('step-count');
        const maxScoreEl = document.getElementById('max-score');
        
        let currentLang = 'python';

        async function log(msg, color = 'text-slate-500') {
            const p = document.createElement('p');
            p.className = color;
            p.innerHTML = `> ${msg}`;
            logs.appendChild(p);
            logs.scrollTop = logs.scrollHeight;
        }

        function switchLang(lang) {
            currentLang = lang;
            document.getElementById('lang-py').className = lang === 'python' ? 'px-3 py-1 rounded text-[10px] font-bold bg-indigo-600 text-white transition' : 'px-3 py-1 rounded text-[10px] font-bold text-slate-400 hover:text-white transition';
            document.getElementById('lang-js').className = lang === 'javascript' ? 'px-3 py-1 rounded text-[10px] font-bold bg-indigo-600 text-white transition' : 'px-3 py-1 rounded text-[10px] font-bold text-slate-400 hover:text-white transition';
            
            // Map buttons to correct task IDs
            const prefix = lang === 'python' ? 'task' : 'js_task';
            document.getElementById('btn-easy').onclick = () => resetTask(`${prefix}_1`);
            document.getElementById('btn-med').onclick = () => resetTask(`${prefix}_2`);
            document.getElementById('btn-hard').onclick = () => resetTask(`${prefix}_3`);
            
            log(`Switched language to ${lang.toUpperCase()}`, 'text-indigo-400 font-bold');
            resetTask(`${prefix}_1`);
        }

        async function resetTask(taskId) {
            try {
                const resp = await fetch(`/reset?task_id=${taskId}`, { method: 'POST' });
                const data = await resp.json();
                editor.value = data.code;
                stepCountEl.innerText = `${data.step_count} / ${data.max_steps}`;
                maxScoreEl.innerText = "0.00";
                rewardFeed.innerHTML = '';
                log(`Environment Reset. Task: ${taskId} initialized.`, 'text-indigo-400');
            } catch (e) {
                log(`Error: Failed to reset task.`, 'text-red-400');
            }
        }

        async function submitCode() {
            log(`Applying action: suggest_fix...`);
            try {
                const resp = await fetch('/step', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action_type: 'suggest_fix', content: editor.value })
                });
                const data = await resp.json();
                
                // Get State for reward details
                const stateResp = await fetch('/state');
                const state = await stateResp.json();
                const reward = state.history[state.history.length - 1].reward;

                stepCountEl.innerText = `${data.step_count} / ${data.max_steps}`;
                maxScoreEl.innerText = reward.value.toFixed(2);
                
                addRewardCard(reward, data.step_count);
                log(`Step ${data.step_count} complete. Reward: ${reward.value.toFixed(2)}`, 'text-emerald-400');
                
                if (reward.done) {
                    log(`ENVIRONMENT TERMINATED. Final Score: ${reward.value.toFixed(2)}`, 'text-yellow-400 font-bold');
                }
            } catch (e) {
                log(`Error: Server communication failed.`, 'text-red-400');
            }
        }

        function addRewardCard(reward, step) {
            const div = document.createElement('div');
            div.className = "bg-white/5 border border-white/10 rounded-lg p-3 animate-in slide-in-from-right-2 duration-300";
            div.innerHTML = `
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[10px] font-bold text-indigo-400">STEP ${step}</span>
                    <span class="text-xs font-mono font-bold ${reward.value >= 0.8 ? 'text-emerald-400' : 'text-amber-400'}">+${reward.value.toFixed(2)}</span>
                </div>
                <p class="text-[11px] text-slate-400 leading-tight">${reward.reason}</p>
            `;
            rewardFeed.prepend(div);
        }

        // Init
        window.onload = () => resetTask('task_1');
    </script>
</body>
</html>
